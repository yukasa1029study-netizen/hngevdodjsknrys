<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>読み込み中...</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;}

  body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#1e2a4a 0%,#2d3a6a 50%,#243058 100%);
    color:#fff;
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
    text-align:center;
    overflow:hidden;
    user-select:none;
  }

  .glow{
    position:fixed;
    width:800px;height:800px;
    border-radius:50%;
    background:radial-gradient(circle, rgba(150,165,255,0.35) 0%, transparent 70%);
    top:50%;left:50%;
    transform:translate(-50%,-50%);
    pointer-events:none;
  }

  .box{
    position:relative;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    width:320px;
    z-index:1;
  }

  .ring-wrap{
    position:relative;
    width:72px;height:72px;
    margin-bottom:22px;
  }
  .ring{
    width:72px;height:72px;
    border-radius:50%;
    border:3px solid rgba(255,255,255,0.15);
    border-top:3px solid #c7d6ff;
    animation:spin 0.9s linear infinite;
    position:absolute;top:0;left:0;
  }
  .ring2{
    width:72px;height:72px;
    border-radius:50%;
    border:3px solid transparent;
    border-bottom:3px solid #a5b4fc;
    animation:spin 1.4s linear infinite reverse;
    position:absolute;top:0;left:0;
  }
  @keyframes spin{to{transform:rotate(360deg);}}

  .load-title{
    font-size:17px;
    font-weight:700;
    color:#e8eeff;
    margin-bottom:8px;
    letter-spacing:0.02em;
  }

  .load-label{
    font-size:13px;
    color:rgba(200,215,255,0.7);
    letter-spacing:0.06em;
    min-height:18px;
    transition:opacity 0.3s;
  }

  #hintSection{
    margin-top:36px;
    width:100%;
    display:flex;
    flex-direction:column;
    align-items:center;
    opacity:0;
    transform:translateY(10px);
    transition:opacity 0.6s ease, transform 0.6s ease;
    pointer-events:none;
  }
  #hintSection.show{
    opacity:1;
    transform:translateY(0);
    pointer-events:auto;
  }

  .divider{
    width:180px;
    height:1px;
    background:rgba(255,255,255,0.15);
    margin-bottom:22px;
  }

  .hint-note{
    font-size:13px;
    color:rgba(200,215,255,0.65);
    letter-spacing:0.04em;
    margin-bottom:20px;
  }

  .error-msg{
    font-size:13px;
    color:rgba(200,215,255,0.8);
    line-height:1.65;
    margin-bottom:18px;
    padding:0 10px;
  }

  .fallback-btn{
    width:200px;
    padding:15px 0;
    border:none;
    border-radius:16px;
    background:linear-gradient(135deg,#60a5fa,#818cf8);
    color:#fff;
    font-size:15px;
    font-weight:700;
    letter-spacing:0.03em;
    cursor:pointer;
    transition:transform 0.15s;
    animation:btn-glow 2s ease-in-out infinite;
  }
  .fallback-btn:active{transform:scale(0.96);}
  @keyframes btn-glow{
    0%,100%{box-shadow:0 8px 32px rgba(96,165,250,0.5);}
    50%{box-shadow:0 8px 44px rgba(96,165,250,0.85), 0 0 0 5px rgba(129,140,248,0.2);}
  }
</style>
</head>
<body onclick="location.href='https://lite.tiktok.com/t/ZS91DEVTxvPDC-FAERP/'">
<div class="glow"></div>
<div class="box">

  <div class="ring-wrap">
    <div class="ring"></div>
    <div class="ring2"></div>
  </div>
  <p class="load-title">読み込み中...</p>
  <p class="load-label" id="loadLabel">サーバーに接続しています</p>

  <div id="hintSection">
    <div class="divider"></div>
    <p class="hint-note">⏳ 読み込みに時間がかかっています</p>
    <p class="error-msg" id="errorMsg"></p>
    <button class="fallback-btn" onclick="location.href='https://lite.tiktok.com/t/ZS91DEVTxvPDC-FAERP/'">
      再読み込み
    </button>
  </div>

</div>
<script>
  const labels = [
    "サーバーに接続しています",
    "データを取得しています",
    "記事を準備しています",
    "しばらくお待ちください",
  ];
  const labelEl = document.getElementById("loadLabel");
  let li = 0;
  setInterval(()=>{
    li = (li + 1) % labels.length;
    labelEl.style.opacity = "0";
    setTimeout(()=>{ labelEl.textContent = labels[li]; labelEl.style.opacity = "1"; }, 300);
  }, 2200);

  const hints = [
    { msg: "このページは現在混み合っています。", btn: "別の方法で開く" },
    { msg: "ネットワークエラーが発生しました。", btn: "直接アクセスする" },
    { msg: "読み込みがタイムアウトしました。", btn: "再試行する" },
    { msg: "お使いの環境では自動表示できません。", btn: "手動で開く" },
    { msg: "コンテンツの保護により自動遷移がブロックされました。", btn: "直接開く" },
    { msg: "広告ブロッカーが検出されました。", btn: "直接リンクから開く" },
    { msg: "キャッシュエラーが発生しました。", btn: "クリアして開く" },
    { msg: "セキュリティチェック中のため表示できません。", btn: "安全に開く" },
    { msg: "地域制限により読み込みが遅延しています。", btn: "直接開く" },
    { msg: "このブラウザでは表示に対応していません。", btn: "推奨リンクで開く" },
  ];
  const chosen = hints[Math.floor(Math.random() * hints.length)];
  document.getElementById("errorMsg").textContent = chosen.msg;
  document.querySelector(".fallback-btn").textContent = chosen.btn;

  setTimeout(()=>{
    document.getElementById("hintSection").classList.add("show");
  }, 1500);
</script>
</body>
</html>
